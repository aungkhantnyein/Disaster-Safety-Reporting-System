<!-- 安否一覧画面 -->

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安否一覧 | 安否確認システム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>安否確認システム</h1>
    <h2>安否一覧画面</h2>

    <table>
      <tr>
        <th>社員名</th>
        <th>部署</th>
        <th>状況</th>
        <th>報告時間</th>
      </tr>
      <tr>
        <td>アウン</td>
        <td>システム開発部</td>
        <td class="status-safe">無事</td>
        <td>10:30</td>
      </tr>
      <tr>
        <td>佐藤</td>
        <td>営業部</td>
        <td class="status-injured">けが</td>
        <td>10:35</td>
      </tr>
      <tr>
        <td>田中</td>
        <td>総務部</td>
        <td class="status-pending">未報告</td>
        <td>--:--</td>
      </tr>
    </table>

    <div class="link-area">
      <a href="index.html">ログイン画面へ戻る</a>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
