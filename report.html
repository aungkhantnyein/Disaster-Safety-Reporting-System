<!-- 安否報告画面 -->

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安否報告 | 安否確認システム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>安否確認システム</h1>
    <h2>安否報告画面</h2>

    <p>名前：アウン</p>
    <p>部署：システム開発部</p>

    <form action="complete.html">
      <div class="form-group">
        

        <div class="radio-group">
          <div class="form-group">
            <label>現在の状況を選んでください</label>
            <select>
                <option>選択してください</option>
                <option>無事です</option>
                <option>けがをしています</option>
                <option>出社できない</option>
            </select>
        </div>
        </div>
      </div>
      <button type="submit">送信</button>
    </form>

    <div class="link-area">
      <a href="list.html">安否一覧を見る</a>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
