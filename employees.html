<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社員一覧画面 | 安否確認システム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>安否確認システム</h1>
    <h2>社員一覧画面</h2>

    <div class="form-group">
        <label for="search">検索</label>
        <input type="text" id="search" placeholder="氏名または部署を入力">
    </div>

    <div class="form-group">
        <label for="sort">並び替え</label>
        <select id="sort">
            <option value="asc">昇順 (A-Z)</option>
            <option value="desc">降順 (Z-A)</option>
        </select>
    </div>

    <button type="button">検索する</button>

    <br><br>

    <table>
        <tr>
            <th>社員番号</th>
            <th>氏名</th>
            <th>部署</th>
            <th>安否状況</th>
            <th>権限</th>
            <th>確認</th>
        </tr>

        <tr>
            <td>A001</td>
            <td>田中 太郎</td>
            <td>IT部</td>
            <td class="status-safe">無事</td>
            <td>一般社員</td>
            <td><input type="checkbox"></td>
        </tr>

        <tr>
            <td>A002</td>
            <td>山本 太郎</td>
            <td>営業部</td>
            <td class="status-injured">けが</td>
            <td>一般社員</td>
            <td><input type="checkbox"></td>
        </tr>

        <tr>
            <td>A003</td>
            <td>高橋 太郎</td>
            <td>総務部</td>
            <td class="status-pending">未報告</td>
            <td>管理者</td>
            <td><input type="checkbox"></td>
        </tr>
    </table>

    <div class="link-area">
        <p><a href="newemployee.html">新規社員登録</a></p>
        <p><a href="admin.html">管理者メニューへ戻る</a></p>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
